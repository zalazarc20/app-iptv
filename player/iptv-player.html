<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IPTV Player</title>
  <link rel="stylesheet" href="iptv-player.css">
  <link rel="stylesheet" href="player-controls.css">
</head>

<body>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Channels</h2>
        <div class="sidebar-controls">
          <input type="text" id="searchInput" placeholder="Search channels..." class="search-input">
          <button id="loadPlaylistBtn" class="btn btn-sm" title="Load M3U file">📂</button>
        </div>
      </div>
      <div id="channelList" class="channel-list">
        <div class="empty-state">
          <p>Load an M3U playlist to start watching</p>
          <p class="hint">Enter a URL with #URL or use the file button</p>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="footer-info">
          <span id="channelCount">0 channels</span>
          <span id="epgStatus" class="epg-status"></span>
        </div>
        <button id="settingsBtn" class="btn btn-sm">⚙</button>
      </div>
    </div>

    <div class="main-content">
      <!-- Start Screen -->
      <div class="start-screen" id="startScreen">
        <div class="start-content">
          <h1>IPTV Player</h1>
          <p>Load a playlist to start watching</p>
          <div class="start-actions">
            <button id="loadFileBtn" class="btn btn-lg">Load M3U File</button>
            <span class="or">or</span>
            <div class="url-input-group">
              <input type="text" id="playlistUrlInput" class="url-input" placeholder="Enter playlist URL...">
              <button id="loadUrlBtn" class="btn btn-sm">Load</button>
            </div>
          </div>
        </div>
      </div>

      <div id="playerContainer">
        <video id="video" playsinline></video>

        <!-- Channel Info Overlay (logo + nombre + programa actual) -->
        <div class="channel-overlay" id="channelOverlay">
          <img class="channel-overlay-logo" id="channelOverlayLogo" src="" alt="">
          <div class="channel-overlay-info">
            <div class="channel-overlay-name" id="channelOverlayName"></div>
            <div class="channel-overlay-program" id="channelOverlayProgram"></div>
          </div>
        </div>

        <!-- Player controls container -->
        <div id="controlsContainer"></div>

        <!-- Loading overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display:none">
          <div class="spinner"></div>
          <span class="loading-text">Loading...</span>
        </div>

        <!-- Error overlay -->
        <div class="video-overlay" id="errorOverlay" style="display:none">
          <div class="error-content">
            <span class="error-message" id="errorMessage"></span>
            <button class="btn-xs" id="errorCloseBtn">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/hls.min.js"></script>
  <script src="/js/shaka-player.compiled.js"></script>
  <script src="player-controls.js"></script>
  <script src="iptv-player.js"></script>
</body>

</html>
