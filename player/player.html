<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stream Player</title>
  <link rel="stylesheet" href="player.css">
  <link rel="stylesheet" href="player-controls.css">
</head>
<body>
  <div id="playerContainer">
    <video id="video" autoplay crossorigin="anonymous"></video>
    <div id="customControlsContainer"></div>
    <div id="errorOverlay" class="error-overlay" style="display:none;">
      <div class="error-box">
        <h2>Playback Error</h2>
        <p id="errorMessage">An error occurred while playing the media.</p>
        <div class="error-actions">
          <button id="retryBtn" class="btn">Retry</button>
          <button id="settingsBtn" class="btn btn-alt">Settings</button>
        </div>
      </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
      <div class="spinner"></div>
      <p>Loading media...</p>
    </div>
  </div>
  <script src="/js/hls.min.js"></script>
  <script src="/js/shaka-player.compiled.js"></script>
  <script src="player-controls.js"></script>
  <script src="player.js"></script>
</body>
</html>
