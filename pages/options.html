<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stream Sniffer Options</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { color: #2ecc71; font-size: 22px; margin-bottom: 24px; }
    h2 { color: #b0b0c8; font-size: 16px; margin-bottom: 12px; margin-top: 20px; }
    .section {
      background: #16213e;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .row label { font-size: 14px; color: #b0b0c8; }
    .switch {
      position: relative; display: inline-block; width: 36px; height: 20px;
    }
    .switch input { opacity:0; width:0; height:0; }
    .slider {
      position: absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
      background: #444; transition:0.3s; border-radius:20px;
    }
    .slider:before {
      position:absolute; content:''; height:16px; width:16px; left:2px; bottom:2px;
      background:#fff; transition:0.3s; border-radius:50%;
    }
    .switch input:checked + .slider { background:#2ecc71; }
    .switch input:checked + .slider:before { transform:translateX(16px); }
    select, textarea, input[type="text"] {
      background: #0f3460;
      color: #eaeaea;
      border: 1px solid #2d2d5e;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
      width: 100%;
    }
    select:focus, textarea:focus, input:focus { border-color: #2ecc71; }
    textarea { resize: vertical; min-height: 60px; font-family: monospace; }
    .desc { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: #2ecc71;
      color: #111;
    }
    .btn:hover { background: #27ae60; }
    .actions { margin-top: 20px; display: flex; gap: 10px; }
  </style>
</head>
<body>
  <h1>Stream Sniffer Options</h1>

  <div class="section">
    <h2>Sniffing</h2>
    <div class="row">
      <label>Enable sniffing (detect media URLs)</label>
      <label class="switch"><input type="checkbox" id="sniffingEnabled"><span class="slider"></span></label>
    </div>
    <div class="row">
      <label>Show overlay on detected pages</label>
      <label class="switch"><input type="checkbox" id="overlayEnabled"><span class="slider"></span></label>
    </div>
    <div class="row">
      <label>Handle direct m3u8/mpd URLs</label>
      <label class="switch"><input type="checkbox" id="directPlayEnabled"><span class="slider"></span></label>
    </div>
  </div>

  <div class="section">
    <h2>Auto Play</h2>
    <div class="row">
      <label>Auto-play detected media</label>
      <select id="autoPlayEnabled">
        <option value="None">Disabled</option>
        <option value="All">All sites</option>
        <option value="Match">Matching domains</option>
      </select>
    </div>
    <div class="row" style="flex-direction:column;align-items:stretch;">
      <label>Domains for matching (space separated)</label>
      <textarea id="autoPlayDomains" placeholder="Example: cbsnews cnn.com"></textarea>
      <div class="desc">Auto-play will trigger when the page URL contains any of these text fragments</div>
    </div>
  </div>

  <div class="section">
    <h2>Keyboard Shortcuts</h2>
    <div class="row">
      <label>Toggle extension popup</label>
      <span style="color:#b0b0c8;font-size:12px;">Alt+Shift+S</span>
    </div>
  </div>

  <div class="actions">
    <button id="saveBtn" class="btn">Save Settings</button>
    <button id="resetBtn" class="btn" style="background:#7f8c8d;">Reset Defaults</button>
  </div>

  <script type="module">
    async function load() {
      const result = await chrome.storage.local.get([
        'sniffingEnabled', 'overlayEnabled', 'directPlayEnabled',
        'autoPlayEnabled', 'autoPlayDomains'
      ]);
      document.getElementById('sniffingEnabled').checked = result.sniffingEnabled ?? true;
      document.getElementById('overlayEnabled').checked = result.overlayEnabled ?? true;
      document.getElementById('directPlayEnabled').checked = result.directPlayEnabled ?? false;
      document.getElementById('autoPlayEnabled').value = result.autoPlayEnabled ?? 'None';
      document.getElementById('autoPlayDomains').value = result.autoPlayDomains ?? '';
    }

    async function save() {
      const options = {
        sniffingEnabled: document.getElementById('sniffingEnabled').checked,
        overlayEnabled: document.getElementById('overlayEnabled').checked,
        directPlayEnabled: document.getElementById('directPlayEnabled').checked,
        autoPlayEnabled: document.getElementById('autoPlayEnabled').value,
        autoPlayDomains: document.getElementById('autoPlayDomains').value
      };
      await chrome.storage.local.set(options);
      chrome.runtime.sendMessage({ command: 'updateOptions', options });
      const btn = document.getElementById('saveBtn');
      btn.textContent = '✓ Saved!';
      setTimeout(() => { btn.textContent = 'Save Settings'; }, 2000);
    }

    async function reset() {
      await chrome.storage.local.set({
        sniffingEnabled: true,
        overlayEnabled: true,
        directPlayEnabled: false,
        autoPlayEnabled: 'None',
        autoPlayDomains: ''
      });
      await load();
      chrome.runtime.sendMessage({
        command: 'updateOptions',
        options: {
          sniffingEnabled: true,
          overlayEnabled: true,
          directPlayEnabled: false,
          autoPlayEnabled: 'None',
          autoPlayDomains: ''
        }
      });
    }

    document.addEventListener('DOMContentLoaded', load);
    document.getElementById('saveBtn').addEventListener('click', save);
    document.getElementById('resetBtn').addEventListener('click', reset);
  </script>
</body>
</html>
